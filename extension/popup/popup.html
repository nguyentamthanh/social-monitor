<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      background: #0d0d14;
      color: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .header-title {
      font-weight: 700;
      font-size: 14px;
      background: linear-gradient(90deg, #fafafa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .settings-btn {
      background: none;
      border: none;
      color: #71717a;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      line-height: 1;
    }
    .settings-btn:hover { color: #a1a1aa; background: rgba(255,255,255,0.06); }
    .body { padding: 14px 16px; }
    .input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    input {
      flex: 1;
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fafafa;
      font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }
    input:focus { border-color: rgba(139,92,246,0.5); }
    input::placeholder { color: #52525b; }
    button.check-btn {
      background: #8b5cf6;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      white-space: nowrap;
    }
    button.check-btn:hover { background: #7c3aed; }
    button.check-btn:disabled { background: #4b3d7a; cursor: not-allowed; }
    .result {
      background: #13131a;
      border: 1px solid rgba(139,92,246,0.18);
      border-radius: 10px;
      padding: 12px 14px;
      min-height: 64px;
    }
    .result-idle { color: #52525b; text-align: center; padding: 12px 0; }
    .result-loading {
      color: #a1a1aa;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid rgba(139,92,246,0.3);
      border-top-color: #8b5cf6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .result-title {
      font-weight: 600;
      font-size: 12px;
      color: #e4e4e7;
      margin-bottom: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .score-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      border: 1px solid;
      margin-bottom: 8px;
    }
    .match-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      background: rgba(255,255,255,0.03);
      border-radius: 6px;
      margin-bottom: 3px;
      gap: 8px;
    }
    .match-name { font-size: 11px; color: #d4d4d8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .match-score { font-size: 11px; font-weight: 700; flex-shrink: 0; }
    .clean { color: #10b981; font-size: 12px; }
    .error { color: #ef4444; font-size: 12px; }
    .meta { color: #71717a; font-size: 11px; margin-bottom: 6px; }
    .open-link {
      display: block;
      margin-top: 10px;
      font-size: 11px;
      color: #8b5cf6;
      text-decoration: none;
      text-align: right;
    }
    .open-link:hover { color: #a78bfa; }
    .no-config {
      color: #f59e0b;
      font-size: 12px;
      text-align: center;
      padding: 8px 0;
    }
    .no-config a { color: #8b5cf6; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">🛡️ Social Monitor</span>
    <button class="settings-btn" id="settingsBtn" title="Cài đặt">⚙️</button>
  </div>
  <div class="body">
    <div class="input-row">
      <input id="urlInput" type="text" placeholder="Dán link YouTube để kiểm tra…" />
      <button class="check-btn" id="checkBtn">Kiểm tra</button>
    </div>
    <div class="result" id="result">
      <div class="result-idle">Dán link YouTube rồi bấm Kiểm tra.</div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
